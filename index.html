<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">

<style>
/* ═══════════════════════════════════════════════
   TYPOGRAPHY SYSTEM — STRIPE / VERCEL GRADE
   Primary:   Inter (Latin UI + numbers)
   Secondary: Heebo (Hebrew text)
   Scale:     Major Third × 1.25 — fluid with clamp()
   Line-height: 1.5 body / 1.1 display
═══════════════════════════════════════════════ */
:root {
  /* ── Palette ── */
  --bg:      #05080e;
  --bg2:     #080c14;
  --bg3:     #0e1420;
  --srf:     #111826;
  --srf2:    #16202e;
  --brd:     rgba(255,255,255,.06);
  --brd2:    rgba(255,255,255,.11);
  --cyan:    #00d4ff;
  --cyan2:   #0099cc;
  --amber:   #ffb020;
  --green:   #00e676;
  --red:     #ff3d57;
  --gold:    #ffd700;

  /* ── Text tokens (Stripe-style) ── */
  --txt:       #eef2f7;   /* primary   — near-white  */
  --txt2:      #94a3b8;   /* secondary — slate-400   */
  --txt3:      #4b5563;   /* tertiary  — muted       */
  --muted:     #5a6a80;
  --dim:       #1a2535;

  /* ── Type scale (fluid) ── */
  --text-xs:   clamp(.625rem, 1.2vw,  .75rem);   /* 10–12px  */
  --text-sm:   clamp(.75rem,  1.5vw,  .875rem);  /* 12–14px  */
  --text-base: clamp(.875rem, 1.8vw,  1rem);     /* 14–16px  */
  --text-md:   clamp(1rem,    2vw,    1.125rem); /* 16–18px  */
  --text-lg:   clamp(1.125rem,2.5vw,  1.375rem); /* 18–22px  */
  --text-xl:   clamp(1.375rem,3.5vw,  1.75rem);  /* 22–28px  */
  --text-2xl:  clamp(1.75rem, 5vw,    2.5rem);   /* 28–40px  */
  --text-3xl:  clamp(2.5rem,  7vw,    4rem);     /* 40–64px  */
  --text-hero: clamp(3.5rem,  18vw,   7rem);     /* hero display */

  /* ── Spacing ── */
  --lh-tight:  1.1;
  --lh-snug:   1.3;
  --lh-normal: 1.5;
  --lh-relaxed:1.65;

  /* ── Letter spacing ── */
  --ls-tight:  -0.022em;
  --ls-snug:   -0.012em;
  --ls-normal:  0;
  --ls-wide:    0.04em;
  --ls-wider:   0.08em;
  --ls-widest:  0.15em;
}

/* ── Base reset ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;}
body{
  font-family:'Heebo','Inter',system-ui,sans-serif;
  font-size:var(--text-base);
  line-height:var(--lh-normal);
  font-weight:400;
  background:var(--bg);
  color:var(--txt);
  min-height:100vh;
  overflow-x:hidden;
}
/* Numbers and Latin — use Inter */
[dir="ltr"], .ltr, .scorebox, .rcard-date, .rcard-num, .tpill,
.stat-n, .pts, .rank-badge, .cup-sc, .sinp, .bc-tot {
  font-family:'Inter',system-ui,sans-serif;
}

/* bg glow */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 50% -5%, rgba(0,212,255,.08) 0%, transparent 55%),
    radial-gradient(ellipse 40% 30% at 90% 90%, rgba(255,176,32,.05) 0%, transparent 50%),
    radial-gradient(ellipse 40% 30% at 10% 70%, rgba(0,212,255,.03) 0%, transparent 50%);
}
.site{position:relative;z-index:1;}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:200;
  background:rgba(5,8,14,.97);
  backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(0,212,255,.1);
}
.nav-inner{
  max-width:100%;margin:0 auto;
  display:flex;align-items:stretch;
  height:60px;padding:0;
}
.nav-logo{display:none;}
.logo-pill{display:none;}
.nav-tabs{display:flex;width:100%;}
.ntab{
  flex:1;padding:0 2px;
  border:none;background:none;
  color:var(--muted);
  cursor:pointer;transition:all .2s;
  font-family:'DM Sans',sans-serif;
  position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;
  border-bottom:2px solid transparent;
}
.tab-icon{font-size:1.2rem;line-height:1;}
.tab-lbl{
  font-family:'Inter',sans-serif;
  font-size:var(--text-xs);
  font-weight:600;
  letter-spacing:var(--ls-widest);
  text-transform:uppercase;
  color:inherit;
}
.ntab:hover{color:var(--txt);background:rgba(255,255,255,.04);}
.ntab.active{color:var(--cyan);border-bottom-color:var(--cyan);background:rgba(0,212,255,.08);}
.ntab:not(:last-child){border-left:1px solid rgba(255,255,255,.04);}

/* ── PAGES ── */
.page{display:none;max-width:100%;margin:0 auto;padding:0 0 100px;}
.page.active{display:block;animation:fadeUp .35s cubic-bezier(.16,1,.3,1);}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* ── HERO ── */
.hero-board{
  position:relative;overflow:hidden;
  border-bottom:1px solid rgba(0,212,255,.15);
  padding:36px 16px 32px;
  text-align:center;
  min-height:260px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#020509;
}
.stadium-svg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.hero-board::before{content:'';}
.hero-board::after{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(180deg,rgba(2,5,9,.2) 0%,rgba(2,5,9,.5) 50%,rgba(2,5,9,.92) 100%),
    radial-gradient(ellipse 90% 70% at 50% 40%,rgba(0,212,255,.07) 0%,transparent 60%);
}
.hero-board>*{position:relative;z-index:2;}
.season-badge{ display:none; }
.hero-year{
  font-family:'Inter',sans-serif;
  font-size:clamp(.65rem, 2.5vw, .85rem);
  font-weight:600;
  letter-spacing:.4em;
  color:rgba(0,212,255,.5);
  text-transform:uppercase;
  margin-top:6px;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.6);}}

/* ══ HERO TITLE — pure CSS, zero font dependency ══ */
.hero-title-wrap{
  display:block;
  text-align:center;
  width:100%;
  padding:4px 0 16px;
}
.hero-txt{
  position:relative;
  display:inline-block;
  font-size:clamp(4.5rem, 24vw, 9rem);
  font-weight:900;
  line-height:1;
  letter-spacing:-3px;
  white-space:nowrap;
}
/* Layer 1 — blur glow far back */
.ht-back{
  position:absolute;
  inset:0;
  color:transparent;
  -webkit-text-stroke:0px;
  background:inherit;
  text-shadow:
    0 0 60px rgba(0,212,255,1),
    0 0 120px rgba(0,212,255,.7),
    0 0 200px rgba(0,212,255,.4);
  -webkit-text-fill-color:rgba(0,212,255,.0);
  filter:blur(8px);
  /* trick: use the text as a mask for the glow */
  color:rgba(0,212,255,.6);
  animation:glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{ opacity:.7; }
  50%{ opacity:1; }
}
/* Layer 2 — stroke outline */
.ht-mid{
  position:absolute;
  inset:0;
  -webkit-text-stroke:3px rgba(0,212,255,.5);
  -webkit-text-fill-color:transparent;
}
/* Layer 3 — main gradient fill, on top */
.ht-front{
  position:relative;
  display:block;
  background:linear-gradient(
    155deg,
    #ffffff 0%,
    #ffffff 30%,
    #7ee8ff 55%,
    #00d4ff 75%,
    #0099cc 100%
  );
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
/* underline */
.hero-txt::after{
  content:'';
  display:block;
  margin:10px auto 0;
  width:55%;
  height:2px;
  border-radius:2px;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(255,255,255,.6) 30%,
    #00d4ff 60%,
    transparent 100%
  );
  box-shadow:0 0 12px rgba(0,212,255,.8);
}
.hero-canvas{ display:none; }
.hero-line-top{ display:none; }
.hero-divider{ display:none; }
.hero-line-bot{ display:none; }
.hero-sub{ display:none; }

/* stats strip */
.stats-strip{
  display:grid;grid-template-columns:repeat(4,1fr);
  background:var(--srf);
  border-top:1px solid rgba(0,212,255,.15);
  border-bottom:1px solid var(--brd);
}
.stat-item{
  padding:18px 8px;text-align:center;
  border-left:1px solid var(--brd);
  transition:background .2s;
}
.stat-item:last-child{border-left:none;}
.stat-item:hover{background:rgba(0,212,255,.05);}
.stat-n{
  font-family:'Heebo',sans-serif;
  font-size:2.2rem;font-weight:900;
  background:linear-gradient(160deg,#fff 30%,var(--cyan) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;
  filter:drop-shadow(0 0 10px rgba(0,212,255,.35));
}
.stat-l{font-family:'Inter',sans-serif;font-size:var(--text-xs);font-weight:500;color:var(--txt3);letter-spacing:var(--ls-wider);text-transform:uppercase;margin-top:3px;}

/* ctas */
.hero-ctas{
  display:flex;gap:10px;padding:14px 16px;
  background:var(--bg2);border-bottom:1px solid var(--brd);
}
.cta-primary{
  flex:2;padding:13px;
  background:var(--cyan);color:var(--bg);
  border:none;border-radius:8px;
  font-family:'Heebo',sans-serif;font-size:var(--text-base);font-weight:800;
  letter-spacing:var(--ls-wide);cursor:pointer;transition:all .2s;
}
.cta-primary:hover{background:#fff;transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,212,255,.3);}
.cta-secondary{
  flex:1;padding:12px;
  background:transparent;border:1px solid var(--brd2);
  border-radius:8px;color:var(--txt);
  font-family:'Heebo',sans-serif;font-size:var(--text-sm);font-weight:600;
  cursor:pointer;transition:all .2s;
}
.cta-secondary:hover{border-color:var(--cyan);color:var(--cyan);}

/* ── SECTION HEADER ── */
.sec-hdr{
  display:flex;align-items:center;gap:10px;
  margin:22px 16px 14px;
}
.sec-dot{
  width:3px;height:28px;background:var(--cyan);
  border-radius:2px;flex-shrink:0;
}
.sec-eye{font-family:'Inter',sans-serif;font-size:var(--text-xs);font-weight:700;letter-spacing:var(--ls-widest);color:var(--cyan);text-transform:uppercase;}
.sec-title{font-family:'Heebo',sans-serif;font-size:var(--text-xl);font-weight:800;letter-spacing:var(--ls-snug);line-height:var(--lh-tight);}

/* ── ROUND CARD ── */
.rcard{
  margin:0 16px 10px;
  background:var(--srf);
  border:1px solid var(--brd);
  border-radius:10px;overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.rcard:hover{border-color:var(--brd2);}
.rcard-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;
  background:var(--bg3);
  border-bottom:1px solid var(--brd);
}
.rcard-num{
  font-family:'Inter',sans-serif;
  font-size:var(--text-sm);font-weight:700;letter-spacing:var(--ls-wider);color:var(--cyan);text-transform:uppercase;
}
.rcard-date{font-family:'Inter',sans-serif;font-size:var(--text-sm);font-weight:700;color:var(--cyan);letter-spacing:.01em;}

/* match row */
.mrow{
  display:grid;
  grid-template-columns:52px 1fr 66px 1fr;
  align-items:center;
  padding:11px 14px;gap:8px;
  border-bottom:1px solid var(--brd);
  transition:background .15s;
}
.mrow:last-of-type{border-bottom:none;}
.mrow:hover{background:rgba(255,255,255,.02);}
.tpill{
  font-family:'Inter',sans-serif;
  font-size:var(--text-xs);font-weight:800;
  letter-spacing:.03em;
  padding:4px 9px;border-radius:6px;
  text-align:center;white-space:nowrap;
  min-width:48px;
}
.s0 .tpill{background:rgba(0,212,255,.18);color:var(--cyan);border:1px solid rgba(0,212,255,.35);box-shadow:0 0 8px rgba(0,212,255,.15);}
.s1 .tpill{background:rgba(139,92,246,.18);color:#c4b5fd;border:1px solid rgba(139,92,246,.35);box-shadow:0 0 8px rgba(139,92,246,.15);}
.t-home{font-family:'Heebo',sans-serif;font-size:var(--text-md);font-weight:800;letter-spacing:var(--ls-snug);text-align:right;}
.t-away{font-family:'Heebo',sans-serif;font-size:var(--text-md);font-weight:800;letter-spacing:var(--ls-snug);text-align:left;}
.bye-row{
  display:flex;justify-content:center;
  padding:9px 14px;
  background:rgba(245,158,11,.04);
  border-bottom:1px solid var(--brd);
}
.bye-row:last-child{border-bottom:none;}
.bye-txt{font-family:'Heebo',sans-serif;font-size:var(--text-sm);font-weight:400;color:var(--txt2);}
.bye-name{color:var(--amber);font-weight:700;}

/* scorebox */
.scorebox{
  direction:ltr;unicode-bidi:bidi-override;
  font-family:'Bebas Neue',cursive;
  font-size:1.15rem;font-weight:400;letter-spacing:4px;
  color:var(--green);
  background:#000;
  border:1px solid rgba(0,230,118,.2);
  border-radius:6px;padding:4px 10px;
  text-align:center;white-space:nowrap;
  box-shadow:0 0 14px rgba(0,230,118,.18),inset 0 0 10px rgba(0,0,0,.7);
  text-shadow:0 0 12px rgba(0,230,118,.7);
}
.scorebox.empty{
  background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.08);
  color:var(--dim);font-size:.65rem;font-weight:400;
  font-family:'Heebo',sans-serif;cursor:pointer;
  letter-spacing:0;box-shadow:none;text-shadow:none;
}
.scorebox.editable:hover{border-color:rgba(0,212,255,.4);box-shadow:0 0 12px rgba(0,212,255,.2);}

/* score editor */
.score-ed{
  display:none;background:var(--bg3);
  border-top:1px solid var(--brd);
  padding:10px 14px;
  align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;
}
.score-ed.open{display:flex;animation:fadeUp .2s ease;}
.sinp{
  width:42px;padding:6px 4px;text-align:center;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(0,212,255,.25);
  border-radius:6px;color:var(--txt);
  font-family:'Inter',sans-serif;font-size:var(--text-md);font-weight:700;direction:ltr;
}
.sinp:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 8px rgba(0,212,255,.2);}
.sdash{color:var(--muted);}
.sbtn{
  padding:5px 12px;border:none;border-radius:6px;
  font-family:'Inter',sans-serif;font-size:var(--text-xs);font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:var(--ls-wide);
}
.sbtn.save{background:var(--cyan);color:var(--bg);}
.sbtn.save:hover{background:#fff;}
.sbtn.cancel{background:transparent;color:var(--muted);border:1px solid var(--brd2);}
.sbtn.del{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2);}

/* ── STANDINGS ── */
.stbl-wrap{margin:0 16px;border:1px solid var(--brd);border-radius:10px;overflow:hidden;}
.stbl{width:100%;border-collapse:collapse;background:var(--srf);}
.stbl thead tr{background:var(--bg3);border-bottom:1px solid var(--brd2);}
.stbl th{
  font-family:'Inter',sans-serif;
  font-size:var(--text-xs);letter-spacing:var(--ls-wider);color:var(--txt);
  padding:10px 5px;text-align:center;font-weight:800;text-transform:uppercase;
  border-bottom:2px solid rgba(0,212,255,.25);
}
.stbl th.name-col{text-align:right;padding-right:14px;color:var(--cyan);}
.stbl td{padding:11px 5px;text-align:center;font-size:var(--text-sm);font-weight:500;border-bottom:1px solid var(--brd);transition:background .15s;}
.stbl td.name-col{font-family:'Heebo',sans-serif;text-align:right;padding-right:14px;font-weight:800;font-size:var(--text-base);letter-spacing:var(--ls-snug);}
.stbl tr:last-child td{border-bottom:none;}
.stbl tr:hover td{background:rgba(255,255,255,.02);}
.stbl tr.top-row td.name-col{color:var(--amber);}
.pts{font-family:'Inter',sans-serif;font-weight:800;color:var(--cyan);font-size:var(--text-base);letter-spacing:var(--ls-tight);}
.gdp{color:var(--green)}.gdn{color:var(--red);}

/* rank badge */
.rank-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:5px;
  font-family:'Inter',sans-serif;font-size:var(--text-xs);font-weight:700;
}
.rank-1{background:rgba(245,158,11,.15);color:var(--amber);}
.rank-2{background:rgba(148,163,184,.1);color:#94a3b8;}
.rank-3{background:rgba(180,120,60,.1);color:#cd7c3c;}
.rank-rest{background:transparent;color:var(--muted);}

/* ── BYES ── */
.tbl-scroll{overflow-x:auto;padding:0 16px;}
.btbl{width:100%;border-collapse:collapse;min-width:520px;background:var(--srf);border:1px solid var(--brd);border-radius:10px;overflow:hidden;}
.btbl th{
  font-family:'Inter',sans-serif;
  font-size:var(--text-xs);letter-spacing:var(--ls-wide);
  color:var(--txt);
  font-weight:700;
  padding:9px 4px;text-align:center;
  background:var(--bg3);border-bottom:1px solid var(--brd2);
}
.btbl th:not(:first-child):not(:last-child){
  color:var(--cyan);
  font-size:.68rem;
  letter-spacing:0;
}
.btbl th:first-child{text-align:right;padding-right:12px;min-width:110px;}
.btbl td{padding:7px 4px;text-align:center;border-bottom:1px solid var(--brd);}
.btbl td:first-child{font-family:'Heebo',sans-serif;text-align:right;padding-right:12px;font-weight:700;font-size:var(--text-sm);letter-spacing:var(--ls-snug);}
.btbl tr:last-child td{border-bottom:none;}
.btbl tr:hover td{background:rgba(255,255,255,.02);}
.bc-bye{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:5px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);font-size:.62rem;}
.bc-play{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;font-size:.6rem;color:var(--dim);}
.bc-tot{font-family:'Inter',sans-serif;font-weight:800;color:var(--cyan);font-size:var(--text-sm);letter-spacing:var(--ls-tight);}

/* ── CUP ── */
.cup-stage{margin-bottom:14px;padding:0 16px;}
.cup-stage-label{
  font-family:'Inter',sans-serif;
  font-size:var(--text-xs);letter-spacing:var(--ls-widest);color:var(--amber);
  font-weight:700;text-transform:uppercase;
  margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
  padding-bottom:6px;border-bottom:1px solid rgba(245,158,11,.12);
}
.cup-match{
  background:var(--srf);border:1px solid var(--brd);
  border-radius:10px;overflow:hidden;
  transition:all .2s;margin-bottom:8px;
}
.cup-match:hover{border-color:var(--brd2);}
.cup-match.final-match{border-color:rgba(245,158,11,.2);box-shadow:0 0 20px rgba(245,158,11,.06);}
.cup-match.champ-match{border-color:rgba(245,158,11,.35);box-shadow:0 0 30px rgba(245,158,11,.1);}
.cup-match-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:var(--bg3);border-bottom:1px solid var(--brd);
}
.cup-match-bar.gold{background:rgba(245,158,11,.05);border-color:rgba(245,158,11,.12);}
.cup-mdate{font-family:'Inter',sans-serif;font-size:var(--text-sm);font-weight:700;color:var(--cyan);}
.cup-mdate.gold{color:var(--cyan);font-weight:700;}
.cup-teams-row{display:grid;grid-template-columns:1fr 68px 1fr;align-items:stretch;min-height:56px;}
.cup-tcell{font-family:'Heebo',sans-serif;display:flex;align-items:center;padding:12px 14px;font-weight:800;font-size:var(--text-base);letter-spacing:var(--ls-snug);}
.cup-tcell.home{justify-content:flex-end;text-align:right;}
.cup-tcell.away{justify-content:flex-start;text-align:left;}
.cup-tcell.win{color:var(--cyan);}
.cup-tcell.win-gold{color:var(--amber);}
.cup-score-cell{
  display:flex;align-items:center;justify-content:center;
  background:#000;border-left:1px solid var(--brd);border-right:1px solid var(--brd);
}
.cup-sc{
  direction:ltr;unicode-bidi:bidi-override;
  font-family:'Bebas Neue',cursive;
  font-size:1.15rem;font-weight:400;letter-spacing:4px;
  color:var(--green);background:#000;
  border:1px solid rgba(0,230,118,.2);
  border-radius:5px;padding:5px 10px;
  text-align:center;white-space:nowrap;
  box-shadow:0 0 14px rgba(0,230,118,.18),inset 0 0 10px rgba(0,0,0,.7);
  text-shadow:0 0 12px rgba(0,230,118,.7);
}
.cup-sc.empty{
  background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.08);
  color:var(--dim);font-size:.68rem;font-weight:400;
  font-family:'Heebo',sans-serif;cursor:pointer;
  letter-spacing:0;box-shadow:none;text-shadow:none;
}
.cup-sc.editable:hover{border-color:rgba(0,212,255,.4);}
.cup-pending{text-align:center;padding:16px;font-size:.76rem;color:var(--muted);font-style:italic;}
.cup-winner-row{
  padding:7px 14px;text-align:center;
  border-top:1px solid var(--brd);background:rgba(245,158,11,.03);
}
.cup-winner-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);
  border-radius:5px;padding:3px 12px;
  font-size:.7rem;font-weight:700;color:var(--amber);letter-spacing:1px;
}
.cup-ed{
  display:none;background:var(--bg3);border-top:1px solid var(--brd);
  padding:10px 14px;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;
}
.cup-ed.open{display:flex;animation:fadeUp .2s ease;}
.champ-box{
  text-align:center;padding:32px 16px;
  background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(0,212,255,.04));
  border-top:1px solid rgba(245,158,11,.2);
}
.champ-trophy{font-size:3.5rem;margin-bottom:12px;animation:trophyFloat 2s ease-in-out infinite;}
@keyframes trophyFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.champ-title{font-family:'Inter',sans-serif;font-size:var(--text-xs);font-weight:700;letter-spacing:var(--ls-widest);color:var(--amber);text-transform:uppercase;margin-bottom:8px;}
.champ-name{font-family:'Heebo',sans-serif;font-size:var(--text-2xl);font-weight:900;color:var(--amber);letter-spacing:var(--ls-snug);text-shadow:0 0 30px rgba(255,176,32,.4);}

/* ── SYNC / LEGEND / TOAST ── */
.sync-row{display:flex;align-items:center;gap:6px;font-family:'Inter',sans-serif;font-size:var(--text-xs);color:var(--txt3);margin-bottom:10px;padding:0 16px;}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite;}
.sdot.off{background:var(--red);animation:none;}
.legend{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;padding:0 16px;}
.leg-i{display:flex;align-items:center;gap:5px;font-size:.66rem;color:var(--muted);}
.leg-dot{width:8px;height:8px;border-radius:3px;}
.toast{
  position:fixed;bottom:72px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--cyan);color:var(--bg);
  padding:9px 20px;border-radius:8px;
  font-size:.8rem;font-weight:800;letter-spacing:.5px;
  opacity:0;transition:all .26s;z-index:400;
  white-space:nowrap;pointer-events:none;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── ADMIN ── */
.admin-fab{
  position:fixed;bottom:18px;left:14px;z-index:200;
  width:38px;height:38px;background:var(--srf);
  border:1px solid var(--brd2);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.9rem;transition:all .2s;
}
.admin-fab:hover{border-color:var(--cyan);}
.admin-bar{
  display:none;position:fixed;bottom:18px;left:60px;z-index:200;
  background:var(--srf);border:1px solid rgba(0,212,255,.25);
  border-radius:8px;padding:7px 14px;align-items:center;gap:10px;
}
.admin-bar.show{display:flex;}
.admin-lbl{font-size:.7rem;color:var(--cyan);font-weight:700;letter-spacing:1px;}
.admin-out{padding:3px 10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:5px;color:#f87171;font-size:.7rem;font-weight:700;cursor:pointer;}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal-box{
  background:var(--srf2);border:1px solid rgba(0,212,255,.2);
  border-radius:14px;padding:36px 28px;
  text-align:center;width:300px;max-width:90vw;
  box-shadow:0 24px 60px rgba(0,0,0,.8);
  animation:fadeUp .3s ease;
}
.modal-logo{font-family:'Heebo',sans-serif;font-size:var(--text-2xl);font-weight:900;color:var(--cyan);margin-bottom:4px;letter-spacing:var(--ls-snug);}
.modal-sub{font-family:'Inter',sans-serif;font-size:var(--text-xs);font-weight:600;letter-spacing:var(--ls-widest);color:var(--txt3);margin-bottom:24px;text-transform:uppercase;}
.pwd-inp{width:100%;padding:11px 14px;background:rgba(255,255,255,.04);border:1px solid var(--brd2);border-radius:8px;color:var(--txt);font-family:'Heebo',sans-serif;font-size:1rem;text-align:center;margin-bottom:10px;outline:none;}
.pwd-inp:focus{border-color:var(--cyan);}
.login-btn{width:100%;padding:11px;background:var(--cyan);border:none;border-radius:8px;color:var(--bg);font-family:'Heebo',sans-serif;font-size:.9rem;font-weight:800;cursor:pointer;transition:background .2s;}
.login-btn:hover{background:#fff;}
.login-err{font-size:.72rem;color:#f87171;margin-top:7px;min-height:18px;}
.modal-close{margin-top:12px;font-size:.72rem;color:var(--muted);cursor:pointer;text-decoration:underline;}

/* ── REFEREE ROW ── */
.ref-row{
  display:flex;align-items:center;
  gap:6px;padding:8px 14px;
  background:rgba(139,92,246,.06);
  border-top:1px solid rgba(139,92,246,.15);
  flex-wrap:wrap;
}
.ref-section-label{
  font-family:'Inter',sans-serif;
  font-size:.6rem;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;
  color:#a78bfa;
  margin-left:6px;
  white-space:nowrap;
}
.ref-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-family:'Heebo',sans-serif;font-size:.62rem;font-weight:600;
  padding:2px 6px;border-radius:5px;
  white-space:nowrap;
}
.ref-badge.r1,.ref-badge.r2{
  background:rgba(139,92,246,.12);
  border:1px solid rgba(139,92,246,.3);
  color:#c4b5fd;
}
.ref-badge.obs{
  background:rgba(245,158,11,.1);
  border:1px solid rgba(245,158,11,.25);
  color:var(--amber);
}
.ref-edit-btn{
  margin-right:auto;
  padding:3px 8px;
  background:none;border:1px solid var(--brd2);border-radius:5px;
  font-size:.62rem;color:var(--muted);cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .15s;
}
.ref-edit-btn:hover{border-color:var(--cyan);color:var(--cyan);}

/* ── MATCH DETAILS PANEL ── */
.match-details-btn{
  margin-right:auto;
  padding:3px 8px;
  background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.15);border-radius:5px;
  font-size:.62rem;color:var(--cyan);cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap;
}
.match-details-btn:hover{background:rgba(0,212,255,.12);}
.match-details-panel{
  display:none;
  background:var(--bg3);
  border-top:1px solid var(--brd);
  padding:10px 14px;
}
.match-details-panel.open{display:block;animation:fadeUp .2s ease;}
.md-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 0;border-bottom:1px solid var(--brd);
  font-size:.78rem;
}
.md-row:last-child{border-bottom:none;}
.md-label{font-family:'Inter',sans-serif;font-size:.62rem;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;}
.md-val{font-family:'Heebo',sans-serif;font-weight:700;color:var(--txt);}
.md-star{color:var(--gold)!important;}

.scorer-btn{
  font-family:'Heebo',sans-serif;
  font-size:.82rem;font-weight:700;color:var(--cyan);
  cursor:pointer;background:rgba(0,212,255,.07);
  border:1px solid rgba(0,212,255,.2);
  border-radius:7px;padding:7px 18px;
  width:100%;transition:all .2s;
}
.scorer-btn:hover{background:rgba(0,212,255,.14);border-color:rgba(0,212,255,.4);}
.scorer-panel{
  display:none;background:var(--bg3);
  border-top:1px solid var(--brd);
  padding:10px 14px;
}
.scorer-panel.open{display:block;animation:fadeUp .2s ease;}
.scorer-title{font-size:.68rem;font-weight:700;color:var(--cyan);margin-bottom:8px;font-family:'Inter',sans-serif;letter-spacing:.05em;}
.scorer-team{margin-bottom:10px;}
.scorer-team-name{font-size:.65rem;color:var(--amber);font-weight:700;margin-bottom:6px;font-family:'Heebo',sans-serif;}
.scorer-player-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 0;border-bottom:1px solid var(--brd);
  gap:8px;
}
.scorer-player-row:last-child{border-bottom:none;}
.scorer-pname{font-size:.78rem;font-weight:600;font-family:'Heebo',sans-serif;flex:1;}
.scorer-pname.captain::after{content:' ©';color:var(--amber);font-size:.6rem;}
.scorer-goals{display:flex;align-items:center;gap:4px;}
.scorer-goals label{font-size:.6rem;color:var(--muted);}
.scorer-num{
  width:36px;padding:3px;text-align:center;
  background:rgba(255,255,255,.05);border:1px solid var(--brd2);
  border-radius:5px;color:var(--txt);
  font-family:'Inter',sans-serif;font-size:.78rem;font-weight:700;
}
.scorer-num:focus{outline:none;border-color:var(--cyan);}
.card-btns{display:flex;gap:3px;}
.card-btn{
  padding:2px 6px;border:1px solid var(--brd2);border-radius:4px;
  background:none;cursor:pointer;font-size:.7rem;transition:all .15s;
}
.card-btn.yellow{border-color:rgba(255,176,32,.4);}
.card-btn.yellow.on{background:var(--amber);color:#000;}
.card-btn.red{border-color:rgba(255,61,87,.4);}
.card-btn.red.on{background:var(--red);color:#fff;}
.mvp-btn{
  padding:4px 10px;border:1px solid var(--brd2);border-radius:5px;
  background:none;cursor:pointer;font-size:.7rem;font-weight:700;color:var(--muted);
  font-family:'Heebo',sans-serif;transition:all .15s;white-space:nowrap;
}
.mvp-btn.on{background:rgba(255,215,0,.15);border-color:var(--gold);color:var(--gold);}
.scorer-save-row{margin-top:10px;display:flex;gap:8px;}

/* ── TEAMS PAGE ── */
.team-tabs{
  display:flex;gap:6px;padding:0 16px 14px;
  overflow-x:auto;scrollbar-width:none;
}
.team-tabs::-webkit-scrollbar{display:none;}
.team-pill{
  flex-shrink:0;padding:7px 14px;
  border:1px solid var(--brd2);border-radius:8px;
  background:var(--srf);color:var(--muted);
  font-family:'Heebo',sans-serif;font-size:.8rem;font-weight:700;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.team-pill.active{background:rgba(0,212,255,.1);border-color:var(--cyan);color:var(--cyan);}
.team-card{margin:0 16px 14px;background:var(--srf);border:1px solid var(--brd);border-radius:10px;overflow:hidden;}
.team-card-head{
  padding:12px 16px;
  background:var(--bg3);border-bottom:1px solid var(--brd);
  display:flex;align-items:center;justify-content:space-between;
}
.team-card-name{font-family:'Heebo',sans-serif;font-size:1.1rem;font-weight:900;letter-spacing:-.02em;}
.team-card-captain{font-size:.7rem;color:var(--amber);font-weight:700;}
.players-table{width:100%;border-collapse:collapse;}
.players-table th{
  font-family:'Heebo',sans-serif;font-size:.85rem;font-weight:800;
  letter-spacing:.02em;color:var(--txt);
  padding:11px 10px;background:rgba(0,212,255,.08);
  border-bottom:2px solid rgba(0,212,255,.3);text-align:center;
}
.players-table th:first-child{text-align:right;}
.players-table td{
  padding:9px 10px;text-align:center;
  font-size:.8rem;border-bottom:1px solid var(--brd);
  transition:background .15s;
}
.players-table td:first-child{text-align:right;font-family:'Heebo',sans-serif;font-weight:700;font-size:.85rem;}
.players-table tr:last-child td{border-bottom:none;}
.players-table tr:hover td{background:rgba(255,255,255,.02);}
.role-badge{
  display:inline-block;font-size:.52rem;font-weight:700;
  padding:1px 5px;border-radius:3px;margin-right:4px;
  font-family:'Inter',sans-serif;letter-spacing:.05em;
}
.role-c{background:rgba(255,176,32,.15);color:var(--amber);border:1px solid rgba(255,176,32,.3);}
.role-m{background:rgba(139,92,246,.15);color:#c4b5fd;border:1px solid rgba(139,92,246,.3);}
.stat-goals{color:var(--green);font-weight:800;font-family:'Inter',sans-serif;}
.stat-mvp{color:var(--gold);}
.stat-yc{color:var(--amber);}
.stat-rc{color:var(--red);}
/* ── TOP SCORERS STRIP ── */
.top-scorer-strip{
  margin:0 16px 14px;
  background:var(--srf);
  border:1px solid rgba(0,230,118,.15);border-radius:10px;
  overflow:hidden;
}
.top-scorer-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 8px;
  border-bottom:1px solid var(--brd);
}
.top-scorer-title{
  font-family:'Heebo',sans-serif;
  font-size:1.1rem;font-weight:900;
  letter-spacing:-.02em;color:var(--green);
}
.top3-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;background:var(--brd);
}
.top3-cell{
  background:var(--srf);
  padding:14px 10px;text-align:center;
  position:relative;
}
.top3-rank{
  font-family:'Inter',sans-serif;font-size:.55rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:4px;
}
.top3-rank.r1{color:var(--gold);}
.top3-rank.r2{color:#94a3b8;}
.top3-rank.r3{color:#cd7c3c;}
.top3-goals{
  font-family:'Inter',sans-serif;font-size:2rem;font-weight:900;
  color:var(--green);line-height:1;
  filter:drop-shadow(0 0 8px rgba(0,230,118,.4));
}
.top3-name{font-family:'Heebo',sans-serif;font-weight:800;font-size:.82rem;margin-top:4px;}
.top3-team{font-size:.6rem;color:var(--muted);margin-top:2px;}
.scorer-expand-btn{
  width:100%;padding:9px;
  background:none;border:none;border-top:1px solid var(--brd);
  font-family:'Heebo',sans-serif;font-size:.78rem;font-weight:700;
  color:var(--cyan);cursor:pointer;transition:background .2s;
}
.scorer-expand-btn:hover{background:rgba(0,212,255,.05);}
.scorers-full-list{display:none;padding:4px 0;}
.scorers-full-list.open{display:block;}
.scorer-full-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 16px;border-bottom:1px solid var(--brd);
}
.scorer-full-row:last-child{border-bottom:none;}
.scorer-full-pos{font-family:'Inter',sans-serif;font-size:.7rem;font-weight:700;color:var(--muted);width:24px;}
.scorer-full-name{font-family:'Heebo',sans-serif;font-weight:700;font-size:.85rem;flex:1;}
.scorer-full-team{font-size:.65rem;color:var(--muted);margin-left:6px;}
.scorer-full-g{font-family:'Inter',sans-serif;font-weight:900;font-size:1rem;color:var(--green);}

/* ── MATCH SCORERS DISPLAY ── */
.match-scorers-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  border-top:1px solid var(--brd);
  background:rgba(0,0,0,.15);
  gap:0;
}
.scorers-side{
  padding:7px 12px;
  display:flex;flex-direction:column;gap:3px;
}
.scorers-side.home{
  border-left:1px solid var(--brd);
  text-align:right;
  align-items:flex-end;
}
.scorers-side.away{
  text-align:left;
  align-items:flex-start;
}
.scorer-chip{
  display:inline-flex;align-items:center;gap:4px;
  font-family:'Heebo',sans-serif;font-size:.75rem;font-weight:700;
  color:var(--txt);white-space:nowrap;
}
.scorer-chip .g{
  color:var(--green);font-family:'Inter',sans-serif;
  font-weight:900;font-size:.7rem;
}
.rc-chip{
  display:inline-flex;align-items:center;gap:3px;
  font-family:'Heebo',sans-serif;font-size:.72rem;color:#f87171;
}

</style>
</head>
<body>
<div class="site">

<nav>
  <div class="nav-inner">
    <div class="nav-tabs">
      <button class="ntab active" onclick="goPage('home')"><span class="tab-icon">🏠</span><span class="tab-lbl">בית</span></button>

    </div>
  </div>
</nav>

<!-- HOME -->
<div class="page active" id="page-home">
  <div class="hero-board">
    <!-- Stadium SVG Background -->
    <svg class="stadium-svg" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <!-- Sky / atmosphere -->
      <defs>
        <radialGradient id="sky" cx="50%" cy="30%"><stop offset="0%" stop-color="#0a1a2e"/><stop offset="100%" stop-color="#020509"/></radialGradient>
        <radialGradient id="floodlight1" cx="50%" cy="50%"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0"/></radialGradient>
        <radialGradient id="floodlight2" cx="50%" cy="50%"><stop offset="0%" stop-color="#00d4ff" stop-opacity="0.15"/><stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/></radialGradient>
        <radialGradient id="pitchglow" cx="50%" cy="50%"><stop offset="0%" stop-color="#003300" stop-opacity="0.9"/><stop offset="100%" stop-color="#001a00" stop-opacity="1"/></radialGradient>
        <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
        <filter id="blur6"><feGaussianBlur stdDeviation="6"/></filter>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <!-- BG -->
      <rect width="800" height="420" fill="url(#sky)"/>
      <!-- Stadium stands - left -->
      <path d="M0,280 L0,0 L180,0 L200,280 Z" fill="#08111e" opacity=".9"/>
      <path d="M0,280 L0,0 L180,0 L200,280 Z" fill="none" stroke="rgba(0,212,255,.06)" stroke-width="1"/>
      <!-- Stadium stands - right -->
      <path d="M800,280 L800,0 L620,0 L600,280 Z" fill="#08111e" opacity=".9"/>
      <path d="M800,280 L800,0 L620,0 L600,280 Z" fill="none" stroke="rgba(0,212,255,.06)" stroke-width="1"/>
      <!-- Top stand -->
      <rect x="180" y="0" width="440" height="120" fill="#060e1a" opacity=".95"/>
      <!-- Stand seat rows - subtle -->
      <line x1="180" y1="30" x2="620" y2="30" stroke="rgba(0,212,255,.04)" stroke-width="1"/>
      <line x1="180" y1="55" x2="620" y2="55" stroke="rgba(0,212,255,.04)" stroke-width="1"/>
      <line x1="180" y1="80" x2="620" y2="80" stroke="rgba(0,212,255,.04)" stroke-width="1"/>
      <line x1="180" y1="105" x2="620" y2="105" stroke="rgba(0,212,255,.04)" stroke-width="1"/>

<script>
const ADMIN_PASSWORD = 'E4754';

const T = ["אדיר F-35","ברק F-16","סופה F-16i","בז F-15","לביא"];

const ORIG=[
  [[0,2],[1,4],[3,5]],[[0,1],[2,3],[4,5]],[[0,3],[1,5],[2,4]],
  [[0,4],[1,3],[2,5]],[[0,5],[1,2],[3,4]],[[0,2],[1,4],[3,5]],
  [[0,1],[2,3],[4,5]],[[0,3],[1,5],[2,4]],[[0,4],[1,3],[2,5]],
  [[0,5],[1,2],[3,4]],[[0,2],[1,4],[3,5]],[[0,1],[2,3],[4,5]],
  [[0,3],[1,5],[2,4]],[[0,4],[1,3],[2,5]],[[0,5],[1,2],[3,4]],
];
const SLOTS=[null,[0,2,1],[1,0,2],[1,0,2],[2,0,1],[0,1,2],[0,2,1],[1,0,2],[1,0,2],[2,0,1],[0,1,2],[0,2,1],[1,0,2],[1,0,2],[2,0,1],[0,1,2]];
const R1FIX=[[5,3,8,3],[0,2,6,5],[1,4,0,0]];
function remap(i){if(i===4)return null;if(i===5)return 4;return i;}

function dateStr(rn){
  const ms=Date.UTC(2026,4,1)+(rn-1)*7*86400000;
  const d=new Date(ms);
  return d.getUTCDate()+'/'+(d.getUTCMonth()+1)+'/'+d.getUTCFullYear();
}
function shortDate(rn){
  const ms=Date.UTC(2026,4,1)+(rn-1)*7*86400000;
  const d=new Date(ms);
  return d.getUTCDate()+'/'+(d.getUTCMonth()+1);
}

const rounds=[], byeOf=[[],[],[],[],[]];
for(let rn=1;rn<=15;rn++){
  const ms=[],bye=[];
  ORIG[rn-1].forEach(([h,a],mi)=>{
    const nh=remap(h),na=remap(a),sl=SLOTS[rn][mi];
    if(nh===null){bye.push(na);byeOf[na].push(rn);}
    else if(na===null){bye.push(nh);byeOf[nh].push(rn);}
    else{
      const fix=R1FIX.find(([rh,ra])=>rh===h&&ra===a);
      ms.push({h:nh,a:na,slot:sl===2?0:sl,sh:rn===1&&fix?fix[2]:null,sa:rn===1&&fix?fix[3]:null,fixed:rn===1&&!!fix});
    }
  });
  ms.sort((a,b)=>a.slot-b.slot);
  if(ms.length===2){ms[0].slot=0;ms[1].slot=1;}
  rounds.push({rn,matches:ms,bye:bye[0]??null});
}

// ── CUP ──
// ליגה מסתיימת מחזור 15 = 07/08/2026
// גביע מתחיל שבוע אחרי = 14/08/2026
const CUP_STAGES = {
  qf:  {label:'רבע גמר',          date:'14/8/2026'},
  sf1: {label:'חצי גמר — משחק 1', date:'21/8/2026'},
  sf2: {label:'חצי גמר — משחק 2', date:'21/8/2026'},
  f:   {label:'גמר',               date:'28/8/2026'},
  ch:  {label:'🌟 אלוף האלופים',   date:'4/9/2026'},
};

function getStandingsSorted(){
  const s=T.map((n,i)=>({name:n,i,mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}));
  rounds.forEach(({matches})=>matches.forEach(m=>{
    if(m.sh===null||m.sa===null)return;
    const h=s[m.h],a=s[m.a];
    h.mp++;a.mp++;h.gf+=m.sh;h.ga+=m.sa;a.gf+=m.sa;a.ga+=m.sh;
    if(m.sh>m.sa){h.w++;h.pts+=3;a.l++;}
    else if(m.sh<m.sa){a.w++;a.pts+=3;h.l++;}
    else{h.d++;a.d++;h.pts++;a.pts++;}
  }));
  return s.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
}

function getCupSc(key){return fbScores['cup_'+key]||null;}

function cupMatchWinner(key){
  const sc=getCupSc(key);
  if(!sc)return null;
  const teams=cupMatchTeams(key);
  if(!teams||!teams.home||!teams.away)return null;
  if(sc.sh>sc.sa)return teams.home;
  if(sc.sa>sc.sh)return teams.away;
  return null;
}

function cupMatchTeams(key){
  const st=getStandingsSorted();
  const p1=st[0]?.name,p2=st[1]?.name,p3=st[2]?.name,p4=st[3]?.name,p5=st[4]?.name;
  const qfWin=cupMatchWinner('qf');
  if(key==='qf')  return {home:p4||'מקום 4',away:p5||'מקום 5'};
  if(key==='sf1') return {home:p1||'מקום 1',away:p2||'מקום 2'};
  if(key==='sf2') return {home:p3||'מקום 3',away:qfWin||(p4?'מנצחת רבע גמר':null)};
  if(key==='f'){
    const sf1Win=cupMatchWinner('sf1'),sf2Win=cupMatchWinner('sf2');
    return {home:sf1Win||'מנצחת חצי גמר 1',away:sf2Win||'מנצחת חצי גמר 2'};
  }
  if(key==='ch'){
    const fWin=cupMatchWinner('f');
    return {home:p1||'אלוף ליגה',away:fWin||'מחזיקת גביע'};
  }
  return null;
}

function renderCup(){
  const bracket=document.getElementById('cupBracket');
  if(!bracket)return;
  bracket.innerHTML='';
  ['qf','sf1','sf2','f','ch'].forEach(key=>{
    const stage=CUP_STAGES[key];
    const teams=cupMatchTeams(key);
    const sc=getCupSc(key);
    const winner=cupMatchWinner(key);
    const isChamp=key==='ch',isFinal=key==='f';
    const isPending=!teams?.away;
    const canEdit=isAdmin;
    const isGold=isChamp||isFinal;

    const wrap=document.createElement('div');
    wrap.className='cup-stage';
    wrap.innerHTML=`<div class="cup-stage-label">${stage.label}</div>`;

    const card=document.createElement('div');
    card.className='cup-match'+(isChamp?' champ-match':isFinal?' final-match':'');

    let html=`<div class="cup-match-bar${isGold?' gold':''}">
      <span class="cup-mdate${isGold?' gold':''}">📅 ${stage.date}</span>
    </div>`;

    if(isPending){
      html+=`<div class="cup-pending">⏳ ממתין לתוצאות קודמות...</div>`;
    } else {
      const homeWin=winner&&winner===teams.home;
      const awayWin=winner&&winner===teams.away;
      const winCls=isGold?'win-gold':'win';
      let scHTML;
      if(sc){
        scHTML=`<span class="cup-sc${canEdit?' editable':''}" dir="ltr"
          ${canEdit?`onclick="openCupEd('${key}')"`:''} >${sc.sa}:${sc.sh}${canEdit?' ✏️':''}</span>`;
      } else {
        scHTML=canEdit
          ?`<span class="cup-sc empty" onclick="openCupEd('${key}')">✏️ הזן</span>`
          :`<span class="cup-sc empty">—</span>`;
      }
      html+=`<div class="cup-teams-row">
        <div class="cup-tcell home${homeWin?' '+winCls:''}">${teams.home}</div>
        <div class="cup-score-cell">${scHTML}</div>
        <div class="cup-tcell away${awayWin?' '+winCls:''}">${teams.away}</div>
      </div>`;
      if(winner){
        html+=`<div class="cup-winner-row"><span class="cup-winner-badge">🏆 מנצח: ${winner}</span></div>`;
      }
      if(canEdit){
        html+=`<div class="cup-ed" id="cuped_${key}">
          <label style="font-size:.7rem;color:var(--muted)">${teams.home}</label>
          <input class="sinp" id="cup_sh_${key}" type="number" min="0" max="30" placeholder="0" dir="ltr">
          <span class="sdash">:</span>
          <input class="sinp" id="cup_sa_${key}" type="number" min="0" max="30" placeholder="0" dir="ltr">
          <label style="font-size:.7rem;color:var(--muted)">${teams.away}</label>
          <button class="sbtn save" onclick="saveCupScore('${key}')">💾</button>
          <button class="sbtn cancel" onclick="closeCupEd('${key}')">ביטול</button>
          <button class="sbtn del" onclick="delCupScore('${key}')">🗑</button>
        </div>`;
      }
    }
    if(isChamp&&winner){
      html+=`<div class="champ-box">
        <div class="champ-trophy">🏆</div>
        <div class="champ-title">אלוף האלופים 2026</div>
        <div class="champ-name">${winner}</div>
      </div>`;
    }
    card.innerHTML=html;
    wrap.appendChild(card);
    bracket.appendChild(wrap);
  });
}

function openCupEd(key){
  document.querySelectorAll('.cup-ed.open').forEach(e=>e.classList.remove('open'));
  const ed=document.getElementById('cuped_'+key);
  if(ed){ed.classList.add('open');ed.querySelector('.sinp').focus();}
}
function closeCupEd(key){const ed=document.getElementById('cuped_'+key);if(ed)ed.classList.remove('open');}

async function saveCupScore(key){
  const sh=parseInt(document.getElementById('cup_sh_'+key).value);
  const sa=parseInt(document.getElementById('cup_sa_'+key).value);
  if(isNaN(sh)||isNaN(sa)||sh<0||sa<0){showToast('נא להזין מספרים תקינים');return;}
  fbScores['cup_'+key]={sh,sa};
  localStorage.setItem('ll_sc',JSON.stringify(fbScores));
  closeCupEd(key);renderCup();showToast('תוצאה נשמרה ✅');
  try{await fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify({scores:fbScores})});}catch(e){}
}
async function delCupScore(key){
  delete fbScores['cup_'+key];
  localStorage.setItem('ll_sc',JSON.stringify(fbScores));
  closeCupEd(key);renderCup();showToast('תוצאה נמחקה ✓');
  try{await fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify({scores:fbScores})});}catch(e){}
}

// storage
let fbScores={};
const BIN_ID='69f85eec36566621a821eeef';
const API_KEY='$2a$10$cpplwlNg44//oUQaAmCene0RbB3QGEjsdJdjTcv50/tK9Xb9Ox0EW';
const BIN_URL='https://api.jsonbin.io/v3/b/'+BIN_ID;

async function initStorage(){
  try{
    const res=await fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':API_KEY}});
    const data=await res.json();
    fbScores=data.record.scores||{};
    loadPlayersFromBin();
    loadRefsFromBin();
    applyScores();renderAll();setSync(true);
  }catch(e){
    try{fbScores=JSON.parse(localStorage.getItem('ll_sc')||'{}')}catch(e2){fbScores={};}
    loadPlayersFromBin();
    loadRefsFromBin();
    applyScores();renderAll();setSync(false);
  }
}
async function syncFromBin(){
  if(scorerPanelOpen) return;
  try{
    const res=await fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':API_KEY}});
    const data=await res.json();
    fbScores=data.record.scores||{};
    applyScores();renderAll();
  }catch(e){}
}
setInterval(syncFromBin,30000);

function applyScores(){
  rounds.forEach(({rn,matches})=>{
    matches.forEach(m=>{
      if(m.fixed)return;
      const k=`r${rn}_${m.h}_${m.a}`;
      const v=fbScores[k];
      if(v!==undefined&&v!==null){m.sh=v.sh;m.sa=v.sa;}
      else{m.sh=null;m.sa=null;}
    });
  });
}

async function doSave(rn,h,a,sh,sa){
  const k=`r${rn}_${h}_${a}`;
  fbScores[k]={sh,sa};
  localStorage.setItem('ll_sc',JSON.stringify(fbScores));
  applyScores();renderAll();showToast('שומר...');
  try{
    await fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify({scores:fbScores})});
    showToast(`${T[h]} ${sh}:${sa} ${T[a]} ✅`);
  }catch(e){showToast('נשמר מקומית');}
}

function setSync(on){
  document.getElementById('sdot').classList.toggle('off',!on);
  document.getElementById('slbl').textContent=on?'מחובר — עדכונים חיים':'מצב לא מקוון';
}

let isAdmin=false;
let activeTeam=0;
function showLogin(){document.getElementById('loginModal').classList.add('show');setTimeout(()=>document.getElementById('pwdInp').focus(),80);}

function goPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+n).classList.add('active');
  ['home','schedule','standings','byes','cup','teams'].forEach((id,i)=>{
    if(id===n) document.querySelectorAll('.ntab')[i].classList.add('active');
  });
  if(n==='cup') renderCup();
  if(n==='teams') renderTeams();
}

function mrowHTML(rn,m,mi){
  const has=m.sh!==null&&m.sa!==null;
  const canEdit=isAdmin&&!m.fixed;
  let sc_html;
  if(has) sc_html=`<span class="scorebox${canEdit?' editable':''}" ${canEdit?`onclick="openEd(${rn},${mi})"`:''} >${m.sa}:${m.sh}</span>`;
  else sc_html=canEdit?`<span class="scorebox empty editable" onclick="openEd(${rn},${mi})">הזן</span>`:`<span class="scorebox empty">—</span>`;
  const ed=isAdmin?`<div class="score-ed" id="ed_${rn}_${mi}">
    <label style="font-size:.7rem;color:var(--muted)">${T[m.h]}</label>
    <input class="sinp" id="sh_${rn}_${mi}" type="number" min="0" max="30" placeholder="0">
    <span class="sdash">:</span>
    <input class="sinp" id="sa_${rn}_${mi}" type="number" min="0" max="30" placeholder="0">
    <label style="font-size:.7rem;color:var(--muted)">${T[m.a]}</label>
    <button class="sbtn save" onclick="sub(${rn},${mi},${m.h},${m.a})">💾</button>
    <button class="sbtn cancel" onclick="closeEd(${rn},${mi})">ביטול</button>
    <button class="sbtn del" onclick="delScore(${rn},${mi},${m.h},${m.a})">🗑 מחק</button>
  </div>`:'';
  const spanel=scorerPanelHTML(rn,m.h,m.a,mi);
  const matchSc=getScorers(rn,m.h,m.a);
  const mvp=getMVP(rn,m.h,m.a);
  const hasSc=Object.keys(matchSc).length>0||mvp;
  const mvpLine=''; // מוצג בשורת השופטים
  
  // כובשים ואדומים — כל קבוצה בצד שלה, אדומים בשורה נפרדת
  function playerSide(ti){
    const goals = PLAYERS[ti].players
      .filter(p => matchSc[p]?.g > 0)
      .map(p => {
        const ps = matchSc[p]||{};
        return `<span class="scorer-chip"><span class="g">⚽${ps.g>1?' ×'+ps.g:''}</span> ${p}</span>`;
      }).join('');
    const reds = PLAYERS[ti].players
      .filter(p => matchSc[p]?.rc > 0)
      .map(p => {
        const ps = matchSc[p]||{};
        return `<span class="rc-chip">🟥${ps.rc>1?' ×'+ps.rc:''} ${p}</span>`;
      }).join('');
    return {goals, reds, hasAny: !!(goals||reds)};
  }
  const homeSide = playerSide(m.h);
  const awaySide = playerSide(m.a);
  const sid = `sc_${rn}_${mi}`;
  const hasRC = !!(homeSide.reds||awaySide.reds);
  const matchScorersRow = (homeSide.hasAny||awaySide.hasAny) ? `
    <div style="text-align:center;border-top:1px solid var(--brd)">
      <button onclick="toggleScorersRow('${sid}')" style="background:none;border:none;color:var(--muted);font-family:'Heebo',sans-serif;font-size:.7rem;padding:5px 12px;cursor:pointer;width:100%;">
        📋 כובשים ▼
      </button>
    </div>
    <div class="match-scorers-row" id="${sid}" style="display:none;">
      <div class="scorers-side home">${homeSide.goals||''}</div>
      <div class="scorers-side away">${awaySide.goals||''}</div>
      ${hasRC ? `<div class="scorers-side home" style="border-top:1px solid var(--brd);padding-top:5px;">${homeSide.reds||''}</div>
      <div class="scorers-side away" style="border-top:1px solid var(--brd);padding-top:5px;">${awaySide.reds||''}</div>` : ''}
    </div>` : '';
  
  const scorerBtnRow=(isAdmin&&has)?`<div style="text-align:center;padding:6px 14px;border-top:1px solid var(--brd)"><button class="scorer-btn" onclick="toggleScorerPanel(${rn},${mi},${m.h},${m.a})">⚽ ${hasSc?'ערוך סטטיסטיקות':'הזן סטטיסטיקות'}</button></div>`:'';
  return `<div class="mrow s${m.slot}" id="mrow_${rn}_${mi}">
    <span class="tpill">${m.slot===0?'16:00':'17:00'}</span>
    <span class="t-home">${T[m.h]}</span>
    ${sc_html}
    <span class="t-away">${T[m.a]}</span>
  </div>${matchScorersRow}${mvpLine}${ed}${scorerBtnRow}${spanel}`;
}

function openEd(rn,mi){document.querySelectorAll('.score-ed.open').forEach(e=>e.classList.remove('open'));const e=document.getElementById(`ed_${rn}_${mi}`);if(e){e.classList.add('open');e.querySelector('.sinp').focus();}}
function closeEd(rn,mi){const e=document.getElementById(`ed_${rn}_${mi}`);if(e)e.classList.remove('open');}
function sub(rn,mi,h,a){
  const sh=parseInt(document.getElementById(`sh_${rn}_${mi}`).value);
  const sa=parseInt(document.getElementById(`sa_${rn}_${mi}`).value);
  if(isNaN(sh)||isNaN(sa)||sh<0||sa<0){showToast('נא להזין מספרים תקינים');return;}
  closeEd(rn,mi);doSave(rn,h,a,sh,sa);
}
async function delScore(rn,mi,h,a){
  const k=`r${rn}_${h}_${a}`;
  delete fbScores[k];
  rounds[rn-1].matches.forEach(m=>{if(m.h===h&&m.a===a){m.sh=null;m.sa=null;}});
  localStorage.setItem('ll_sc',JSON.stringify(fbScores));
  closeEd(rn,mi);renderAll();showToast('מוחק...');
  try{
    const res=await fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify({scores:fbScores})});
    if(res.ok)showToast('תוצאה נמחקה ✓');
  }catch(e){showToast('נמחק מקומית');}
}

function roundHTML({rn,matches,bye}){
  let h=`<div class="rcard-head"><span class="rcard-num">מחזור ${rn}</span><span class="rcard-date">שישי, ${dateStr(rn)}</span></div>`;
  matches.forEach((m,mi)=>{h+=mrowHTML(rn,m,mi); h+=refRowHTML(rn,mi);});
  if(bye!==null)h+=`<div class="mrow bye-row"><span class="bye-txt">😴 חופש: <span class="bye-name">${T[bye]}</span></span></div>`;
  return h;
}

function renderAll(){
  if(scorerPanelOpen) return;
  // Home
  document.getElementById('homeCard').innerHTML=roundHTML(rounds[0]);
  // Schedule
  const g=document.getElementById('schedGrid');g.innerHTML='';
  rounds.forEach(r=>{const c=document.createElement('div');c.className='rcard';c.innerHTML=roundHTML(r);g.appendChild(c);});
  // Standings
  const s=T.map((n,i)=>({n,i,mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}));
  rounds.forEach(({matches})=>matches.forEach(m=>{
    if(m.sh===null)return;
    const h=s[m.h],a=s[m.a];h.mp++;a.mp++;h.gf+=m.sh;h.ga+=m.sa;a.gf+=m.sa;a.ga+=m.sh;
    if(m.sh>m.sa){h.w++;h.pts+=3;a.l++;}else if(m.sh<m.sa){a.w++;a.pts+=3;h.l++;}else{h.d++;a.d++;h.pts++;a.pts++;}
  }));
  s.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
  const rankCls=(i)=>['rank-1','rank-2','rank-3'][i]||'rank-rest';
  document.getElementById('standTable').innerHTML=`<thead><tr>
    <th>#</th><th class="name-col">קבוצה</th>
    <th title="משחקים">מ</th><th title="ניצחון">נ</th><th title="תיקו">ת</th><th title="הפסד">ה</th>
    <th title="שערים בעד">שב</th><th title="שערים נגד">שנ</th><th title="הפרש">הפ</th><th title="נקודות" style="color:var(--cyan)">נק</th>
  </tr></thead><tbody>${s.map((t,i)=>{const gd=t.gf-t.ga;return`<tr class="${i===0?'top-row':''}">
    <td><span class="rank-badge ${rankCls(i)}">${i+1}</span></td>
    <td class="name-col">${t.n}</td>
    <td>${t.mp}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
    <td>${t.gf}</td><td>${t.ga}</td>
    <td class="${gd>0?'gdp':gd<0?'gdn':''}">${gd>0?'+':''}${gd}</td>
    <td class="pts">${t.pts}</td>
  </tr>`;}).join('')}</tbody>`;
  // Byes
  let bh=`<thead><tr><th>קבוצה</th>`;
  for(let r=1;r<=15;r++) bh+=`<th>${shortDate(r)}</th>`;
  bh+=`<th>סה״כ</th></tr></thead><tbody>`;
  T.forEach((nm,ti)=>{
    bh+=`<tr><td>${nm}</td>`;
    for(let r=1;r<=15;r++) bh+=`<td>${byeOf[ti].includes(r)?'<span class="bc-bye">😴</span>':'<span class="bc-play">⚽</span>'}</td>`;
    bh+=`<td><span class="bc-tot">${byeOf[ti].length}</span></td></tr>`;
  });
  document.getElementById('byeTable').innerHTML=bh+'</tbody>';
}

let REF_SCHEDULE = {...REF_SCHEDULE_DEFAULT};

function getRefs(rn, mi){ 
  const key = `${rn}_${mi}`;
  const r = REF_SCHEDULE[key] || REF_SCHEDULE_DEFAULT[key];
  if(!r) return null;
  // ולידציה — בדוק שאף שופט לא שייך לקבוצות המשחקות
  const m = rounds[rn-1]?.matches[mi];
  if(m){
    const refs = [r.r1, r.r2, r.obs];
    const valid = refs.every(ref => REF_TEAM[ref] !== m.h && REF_TEAM[ref] !== m.a);
    if(!valid){
      // חזור ל-DEFAULT
      return REF_SCHEDULE_DEFAULT[key] || null;
    }
  }
  return r;
}

function refRowHTML(rn, mi){
  const r = getRefs(rn, mi);

  return `<div class="ref-row">
    <span class="ref-section-label">🏁 שופטים</span>

    <span class="ref-badge r2">🟣 ${r.r2}</span>

}

// ══ REF SCHEDULE VERSION — כל פעם שמשנים שיבוץ, העלה את המספר ══
const REF_SCHEDULE_VERSION = 3;

function loadRefsFromBin(){
  // תמיד נקה refs ישנים — השתמש רק ב-DEFAULT
  // שינויים ידניים של מנהל נשמרים בנפרד עם גרסה
  const binVersion = fbScores['ref_version'] || 0;
  if(binVersion < REF_SCHEDULE_VERSION){
    // גרסה ישנה — נקה הכל ואל תדרוס DEFAULT
    for(let rn=1;rn<=15;rn++){
      for(let mi=0;mi<2;mi++){
        delete fbScores[`ref_${rn}_${mi}`];
      }
    }
    // שמור גרסה חדשה ב-bin בשקט
    fbScores['ref_version'] = REF_SCHEDULE_VERSION;
    setTimeout(async()=>{
      try{await fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify({scores:fbScores})});}catch(e){}
    }, 2000);
    return;
  }
  // גרסה עדכנית — טען רק שינויים ידניים של מנהל
  for(let rn=1;rn<=15;rn++){
    for(let mi=0;mi<2;mi++){
      const key=`${rn}_${mi}`;
      const saved = fbScores[`ref_${key}`];
      if(saved){
        // ולידציה — וודא שהשופטים לא שייכים לקבוצות
        const m = rounds[rn-1]?.matches[mi];
        if(m){
          const refs = [saved.r1,saved.r2,saved.obs];
          const valid = refs.every(ref=>REF_TEAM[ref]!==m.h && REF_TEAM[ref]!==m.a);
          if(valid) REF_SCHEDULE[key] = saved;
        }
      }
    }
  }
}

function getMatchKey(rn,h,a){return `r${rn}_${h}_${a}`;}

function allPlayerStats(){
  const stats={};
  // init
  for(let ti=0;ti<5;ti++){
    const pd=PLAYERS[ti];
    [...pd.players].forEach(p=>{
      stats[p]={goals:0,mvp:0,yc:0,rc:0,team:ti};
    });
  }
  // accumulate
  rounds.forEach(({rn,matches})=>{
    matches.forEach(m=>{
      const sc=getScorers(rn,m.h,m.a);
      Object.entries(sc).forEach(([pname,data])=>{
        if(!stats[pname]) return;
        stats[pname].goals+=(data.g||0);
        stats[pname].yc+=(data.yc||0);
        stats[pname].rc+=(data.rc||0);
      });
      const mvp=getMVP(rn,m.h,m.a);
      if(mvp&&stats[mvp]) stats[mvp].mvp++;
    });
  });
  return stats;
}

function renderTeams(){
  const stats=allPlayerStats();
  const tabsEl=document.getElementById('teamTabs');
  tabsEl.innerHTML=T.map((name,i)=>`
    <button class="team-pill${i===activeTeam?' active':''}" onclick="setTeam(${i})">${name.replace(' F-35','').replace(' F-16i','').replace(' F-16','').replace(' F-15','')}</button>
  `).join('');

  const content=document.getElementById('teamContent');
  content.innerHTML='';

  // Top scorers — top 3 big + expandable
  const allStats=Object.entries(stats).map(([n,s])=>({name:n,...s}))
    .filter(s=>s.goals>0).sort((a,b)=>b.goals-a.goals);
  
  const strip=document.createElement('div');
  strip.className='top-scorer-strip';
  
  const top3=allStats.slice(0,3);
  const rest=allStats.slice(3);
  const rankCls=['r1','r2','r3'];
  const rankLabel=['🥇 ראשון','🥈 שני','🥉 שלישי'];
  
  const top3HTML=top3.length?`
    <div class="top3-grid">
      ${top3.map((s,i)=>`
        <div class="top3-cell">
          <div class="top3-rank ${rankCls[i]}">${rankLabel[i]}</div>

    </div>`:'<div style="padding:16px;text-align:center;font-size:.75rem;color:var(--muted)">אין גולים עדיין</div>';
  
  const restHTML=rest.length?`
    <button class="scorer-expand-btn" onclick="toggleScorers(this)">
      ראה עוד ${rest.length} כובשים ▼

    <div class="scorers-full-list">

          <span class="scorer-full-pos">${i+4}</span>
          <span class="scorer-full-name">${s.name}<span class="scorer-full-team">· ${T[s.team]}</span></span>
          <span class="scorer-full-g">${s.goals}</span>
        </div>`).join('')}
    </div>`:'';
  
  strip.innerHTML=`
    <div class="top-scorer-head">
      <span class="top-scorer-title">⚽ מלך השערים</span>
    </div>
    ${top3HTML}
    ${restHTML}`;
  content.appendChild(strip);

  const ti=activeTeam;
  const pd=PLAYERS[ti];
  const card=document.createElement('div');
  card.className='team-card';

  let rows=pd.players.map(pname=>{
    const s=stats[pname]||{goals:0,mvp:0,rc:0};
    const isCap=pname===pd.captain;
    const isCoach=pname===pd.coach;
    return `<tr>
      <td>
        ${isCap?'<span class="role-badge role-c">© קפטן</span>':''}
        ${isCoach?'<span class="role-badge role-m">מאמן</span>':''}
        ${pname}
      </td>
      <td class="stat-goals">${s.goals||'—'}</td>
      <td class="stat-mvp">${s.mvp?'⭐'.repeat(Math.min(s.mvp,5))+(s.mvp>5?` (${s.mvp})`:''):'—'}</td>
      <td class="stat-rc">${s.rc?`🟥 ${s.rc}`:'—'}</td>
    </tr>`;
  }).join('');

  card.innerHTML=`
    <div class="team-card-head">
      <span class="team-card-name">${T[ti]}</span>
      <span class="team-card-captain">© ${pd.captain}${pd.coach?` · M ${pd.coach}`:''}</span>
    </div>
    <table class="players-table">
      <thead><tr>
        <th>שחקן</th>
        <th>⚽ גולים</th>
        <th>⭐ מצטיין</th>
        <th>🟥 אדום</th>
      </tr></thead>

    </table>`;

}

// ══ SCORER PANEL in match rows ══
function scorerPanelHTML(rn,h,a,mi){
  const sc=getScorers(rn,h,a);
  const mvp=getMVP(rn,h,a);
  const id=`sp_${rn}_${mi}`;
  const canEdit=isAdmin;

  const teamRows=[h,a].map(ti=>{
    const pd=PLAYERS[ti];
    const prows=pd.players.map(pname=>{
      const ps=sc[pname]||{};
      if(!canEdit){
        // תצוגה בלבד
        if(!ps.g && !ps.rc && mvp!==pname) return '';
        return `<div class="scorer-player-row">
          <span class="scorer-pname">${pname}${pname===pd.captain?' ©':''}</span>
          <span>${ps.g?`⚽×${ps.g}`:''}</span>
          <span>${ps.rc?'🟥×'+ps.rc:''}</span>
          <span>${mvp===pname?'⭐ מצטיין':''}</span>
        </div>`;
      }
      return `<div class="scorer-player-row">
        <span class="scorer-pname${pname===pd.captain?' captain':''}" data-name="${pname}">${pname}${pname===pd.coach?' 🎽':''}</span>
        <div class="scorer-goals">
          <label>⚽</label>
          <input class="scorer-num" id="sg_${rn}_${mi}_${pname.replace(/[\s.\/]/g,'_')}" type="number" min="0" max="15" value="${ps.g||0}">
        </div>
        <div class="scorer-goals">
          <label>🟥</label>
          <input class="scorer-num" id="src_${rn}_${mi}_${pname.replace(/[\s.\/]/g,'_')}" type="number" min="0" max="10" value="${ps.rc||0}" style="border-color:rgba(255,61,87,.3);">
        </div>
        <button class="mvp-btn${mvp===pname?' on':''}" onclick="selectMVP('${rn}','${mi}',this)">⭐</button>
      </div>`;
    }).filter(Boolean).join('');
    if(!prows && !canEdit) return '';
    return `<div class="scorer-team"><div class="scorer-team-name">${T[ti]}</div>${prows||'<div style="font-size:.7rem;color:var(--muted);padding:6px 0">אין נתונים עדיין</div>'}</div>`;
  }).join('');

  const hasSc=Object.keys(sc).length>0||mvp;
  // מנהל תמיד רואה פאנל, צופה רק אם יש נתונים
  if(!canEdit && !hasSc) return '';

  return `<div class="scorer-panel" id="${id}">
    <div class="scorer-title">${canEdit?'⚽ כובשים · 🟥 אדומים · ⭐ מצטיין':'📊 סטטיסטיקות משחק'}</div>
    ${teamRows}
    ${canEdit?`<div class="scorer-save-row">
      <button class="sbtn save" onclick="saveScorers('${rn}','${mi}','${h}','${a}')">💾 שמור</button>
      <button class="sbtn cancel" onclick="closeScorerPanel('${id}')">סגור</button>
    </div>`:''}
  </div>`;
}

let scorerPanelOpen = false;

function toggleScorerPanel(rn,mi,h,a){
  document.querySelectorAll('.scorer-panel').forEach(e=>{
    if(e.id!==`sp_${rn}_${mi}`) e.classList.remove('open');
  });
  const el=document.getElementById(`sp_${rn}_${mi}`);
  if(el){
    const opening = !el.classList.contains('open');
    el.classList.toggle('open');
    scorerPanelOpen = opening;
    if(opening) el.querySelector('.scorer-num')?.focus();
  }
}
function closeScorerPanel(id){
  const el=document.getElementById(id);
  if(el) el.classList.remove('open');
  scorerPanelOpen = false;
}

function toggleScorersRow(id){
  const el=document.getElementById(id);
  const btn=el?.previousElementSibling?.querySelector('button');
  if(!el) return;
  const open=el.style.display==='grid';
  el.style.display=open?'none':'grid';
  if(btn) btn.textContent=open?'📋 כובשים ▼':'📋 כובשים ▲';
}

function toggleScorers(btn){
  const list=btn.nextElementSibling;
  list.classList.toggle('open');
  btn.textContent=list.classList.contains('open')
    ?'סגור רשימה ▲'
    :`ראה עוד ${list.children.length} כובשים ▼`;
}

function selectMVP(rn,mi,btn){
  const panel=document.getElementById(`sp_${rn}_${mi}`);
  panel.querySelectorAll('.mvp-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

async function saveScorers(rn,mi,h,a){
  const panel=document.getElementById(`sp_${rn}_${mi}`);
  const sc={};
  const teams=[parseInt(h),parseInt(a)];
  teams.forEach(ti=>{
    PLAYERS[ti].players.forEach(pname=>{
      const key=pname.replace(/[\s.\/]/g,'_');
      const gEl=document.getElementById(`sg_${rn}_${mi}_${key}`);
      if(!gEl) return;
      const g=parseInt(gEl.value)||0;
      const rcEl=document.getElementById(`src_${rn}_${mi}_${key}`);
      const rc=parseInt(rcEl?.value)||0;
      if(g||rc) sc[pname]={g,rc};
    });
  });

  // ── ולידציה: סכום גולים = תוצאה ──
  const match = rounds[rn-1]?.matches[mi];
  if(match && match.sh!==null && match.sa!==null){
    const homeGoals = PLAYERS[parseInt(h)].players.reduce((s,p)=>{
      const key=p.replace(/[\s.\/]/g,'_');
      const el=document.getElementById(`sg_${rn}_${mi}_${key}`);
      return s+(parseInt(el?.value)||0);
    },0);
    const awayGoals = PLAYERS[parseInt(a)].players.reduce((s,p)=>{
      const key=p.replace(/[\s.\/]/g,'_');
      const el=document.getElementById(`sg_${rn}_${mi}_${key}`);
      return s+(parseInt(el?.value)||0);
    },0);

    if(homeGoals !== match.sh){
      showToast(`❌ גולים של ${T[parseInt(h)]}: ${homeGoals} ≠ תוצאה ${match.sh}`);
      return;
    }
    if(awayGoals !== match.sa){
      showToast(`❌ גולים של ${T[parseInt(a)]}: ${awayGoals} ≠ תוצאה ${match.sa}`);
      return;
    }
  }

  // MVP
  const mvpBtn=panel.querySelector('.mvp-btn.on');
  let mvpName=null;
  if(mvpBtn){
    const prow=mvpBtn.closest('.scorer-player-row');
    mvpName=prow?.querySelector('.scorer-pname')?.getAttribute('data-name')||prow?.querySelector('.scorer-pname')?.textContent.replace('🎽','').replace('©','').trim()||null;
  }
  const mkey=`r${rn}_${h}_${a}`;
  fbScores[`sc_${mkey}`]=sc;
  if(mvpName) fbScores[`mvp_${mkey}`]=mvpName;
  else delete fbScores[`mvp_${mkey}`];
  localStorage.setItem('ll_sc',JSON.stringify(fbScores));
  closeScorerPanel(`sp_${rn}_${mi}`);
  renderAll();
  showToast('סטטיסטיקות נשמרו ✅');
  try{await fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify({scores:fbScores})});}catch(e){}
}

// ══ HERO CANVAS RENDERER ══
function drawHero(){
  const canvas = document.getElementById('heroCanvas');
  if(!canvas) return;
  const DPR = window.devicePixelRatio || 2;
  const W = Math.min(580, window.innerWidth * 0.96);
  const H = W * 0.24;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);
  ctx.clearRect(0,0,W,H);

  const TEXT = 'לנו-ליגה';
  const FS = Math.round(H * 0.82);
  ctx.font = `900 ${FS}px 'Heebo', 'Arial Black', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const cx = W/2, cy = H/2 + H*0.04;

  // Layer 1 — wide outer glow (cyan)
  ctx.save();
  ctx.shadowColor = '#00d4ff';
  ctx.shadowBlur = 40;
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#00d4ff';
  ctx.fillText(TEXT, cx, cy);
  ctx.restore();

  // Layer 2 — medium glow
  ctx.save();
  ctx.shadowColor = '#00d4ff';
  ctx.shadowBlur = 20;
  ctx.globalAlpha = 0.55;
  ctx.fillStyle = '#00d4ff';
  ctx.fillText(TEXT, cx, cy);
  ctx.restore();

  // Layer 3 — thick cyan stroke (depth)
  ctx.save();
  ctx.strokeStyle = 'rgba(0,212,255,0.2)';
  ctx.lineWidth = 10;
  ctx.lineJoin = 'round';
  ctx.strokeText(TEXT, cx, cy);
  ctx.restore();

  // Layer 4 — white stroke outline
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.45)';
  ctx.lineWidth = 2;
  ctx.strokeText(TEXT, cx, cy);
  ctx.restore();

  // Layer 5 — gradient fill (white → cyan diagonal)
  const grad = ctx.createLinearGradient(cx - W*0.4, cy - H*0.4, cx + W*0.4, cy + H*0.4);
  grad.addColorStop(0,   '#ffffff');
  grad.addColorStop(0.38,'#ffffff');
  grad.addColorStop(0.62,'#00d4ff');
  grad.addColorStop(1,   '#0099cc');
  ctx.save();
  ctx.shadowColor = '#00d4ff';
  ctx.shadowBlur = 12;
  ctx.fillStyle = grad;
  ctx.fillText(TEXT, cx, cy);
  ctx.restore();

  // Layer 6 — vertical sheen (top bright)
  ctx.save();
  const sheen = ctx.createLinearGradient(0, cy - H*0.45, 0, cy + H*0.45);
  sheen.addColorStop(0,   'rgba(255,255,255,0.55)');
  sheen.addColorStop(0.3, 'rgba(255,255,255,0.0)');
  sheen.addColorStop(1,   'rgba(0,0,0,0.2)');
  ctx.globalCompositeOperation = 'source-atop';
  ctx.fillStyle = sheen;
  ctx.fillText(TEXT, cx, cy);
  ctx.restore();

  // Layer 7 — underline bar
  const metrics = ctx.measureText(TEXT);
  const tw = Math.min(metrics.width, W * 0.85);
  const bx = cx - tw*0.42, by = cy + H*0.42, bw = tw*0.84, bh = Math.max(2, H*0.025);
  const barGrad = ctx.createLinearGradient(bx, 0, bx+bw, 0);
  barGrad.addColorStop(0,'transparent');
  barGrad.addColorStop(0.3,'#ffffff');
  barGrad.addColorStop(0.7,'#00d4ff');
  barGrad.addColorStop(1,'transparent');
  ctx.save();
  ctx.shadowColor='#00d4ff'; ctx.shadowBlur=10;
  ctx.fillStyle = barGrad;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, bh/2);
  ctx.fill();
  ctx.restore();
}

// Draw after fonts load
document.fonts.ready.then(()=>{ drawHero(); });
